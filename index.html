<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Widget Pro + Adhan</title>
    <style>
        :root { --blue-glow: #00d2ff; }
        
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
            background: #0d0d0d; font-family: sans-serif; overflow: hidden; 
        }

        .widget {
            width: 160px; height: 160px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 2px solid var(--blue-glow);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; 
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
            margin-bottom: 50px;
        }

        .name { font-size: 24px; font-weight: bold; }
        .time { font-size: 16px; opacity: 0.9; margin-top: 5px; }
        .countdown { font-size: 14px; color: var(--blue-glow); margin-top: 10px; font-weight: bold; }

        .start-btn {
            padding: 18px 45px; border-radius: 35px; border: none;
            background: var(--blue-glow); color: #0d0d0d;
            font-weight: bold; cursor: pointer; font-size: 18px;
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <audio id="adhanAudio">
        <source src="https://www.islamcan.com/islamic-ringtones/Morning_Azaan.mp3" type="audio/mpeg">
    </audio>

    <div id="pCard" class="widget">
        <div id="pName" class="name">تحميل..</div>
        <div id="pTime" class="time">..</div>
        <div id="pCount" class="countdown">..</div>
    </div>

    <a href="http://action_exit" class="start-btn" onclick="enableAudio()">تشغيل وتثبيت</a>

    <script>
        let audioEnabled = false;

        function enableAudio() {
            // المتصفحات تمنع تشغيل الصوت تلقائياً إلا بعد تفاعل المستخدم
            const audio = document.getElementById('adhanAudio');
            audio.play().then(() => {
                audio.pause(); // تشغيل وإيقاف سريع فقط لتفعيل الإذن
                audioEnabled = true;
            });
        }

        function update() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const times = {"الفجر": [4, 15], "الظهر": [12, 10], "العصر": [15, 45], "المغرب": [18, 50], "العشاء": [20, 20]};
                    const now = new Date();
                    const currentTime = now.getHours() * 60 + now.getMinutes();
                    
                    let selectedName = "الفجر";
                    let selectedTime = times["الفجر"];

                    if (currentTime > (20 * 60 + 20)) { selectedName = "الفجر"; selectedTime = [28, 15]; }
                    else if (currentTime > (18 * 60 + 50)) { selectedName = "العشاء"; selectedTime = times["العشاء"]; }
                    else if (currentTime > (15 * 60 + 45)) { selectedName = "المغرب"; selectedTime = times["المغرب"]; }
                    else if (currentTime > (12 * 60 + 10)) { selectedName = "العصر"; selectedTime = times["العصر"]; }
                    else if (currentTime > (4 * 60 + 15)) { selectedName = "الظهر"; selectedTime = times["الظهر"]; }

                    document.getElementById('pName').innerText = selectedName;
                    
                    // تحويل الوقت إلى نظام 12 ساعة
                    let hour24 = selectedTime[0] > 23 ? selectedTime[0] - 24 : selectedTime[0];
                    let period = hour24 >= 12 ? "م" : "ص";
                    let hour12 = hour24 % 12 || 12;

                    document.getElementById('pTime').innerText = 
                        `${hour12.toString().padStart(2, '0')}:${selectedTime[1].toString().padStart(2, '0')} ${period}`;
                    
                    let diffMinutes = (selectedTime[0] * 60 + selectedTime[1]) - currentTime;
                    document.getElementById('pCount').innerText = `باقي ${Math.floor(diffMinutes/60)}س و${diffMinutes%60}د`;

                    // تشغيل الصوت عندما يصبح العد التنازلي صفراً
                    if (diffMinutes === 0 && audioEnabled) {
                        document.getElementById('adhanAudio').play();
                    }
                });
            }
        }
        update(); setInterval(update, 60000);
    </script>
</body>
</html>
