<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Prayer Circle</title>
    <style>
        :root { --blue-glow: #00d2ff; }
        body { 
            margin: 0; background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        /* تصميم الدائرة التي أشرت إليها */
        #canvasContainer {
            position: relative; width: 180px; height: 180px;
        }
        canvas {
            width: 100%; height: 100%; border-radius: 50%;
            box-shadow: 0 0 20px var(--blue-glow);
        }
        .start-btn {
            margin-top: 30px; padding: 15px 30px; border-radius: 25px;
            background: var(--blue-glow); border: none; font-weight: bold; cursor: pointer;
        }
        video { display: none; } /* الفيديو مخفي، نستخدمه فقط للخدعة التقنية */
    </style>
</head>
<body>

    <div id="canvasContainer">
        <canvas id="prayerCanvas" width="300" height="300"></canvas>
    </div>

    <video id="pipVideo" autoplay muted playsinline></video>

    <button class="start-btn" onclick="startFloating()">تفعيل الأيقونة العائمة</button>

    <script>
        const canvas = document.getElementById('prayerCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('pipVideo');

        function drawWidget(name, time, countdown) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم الخلفية الدائرية
            ctx.beginPath();
            ctx.arc(150, 150, 140, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a1a';
            ctx.fill();
            ctx.strokeStyle = '#00d2ff';
            ctx.lineWidth = 5;
            ctx.stroke();

            // النصوص
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 40px Arial";
            ctx.fillText(name, 150, 110);
            
            ctx.font = "30px Arial";
            ctx.fillText(time, 150, 170);
            
            ctx.fillStyle = "#00d2ff";
            ctx.font = "bold 22px Arial";
            ctx.fillText(countdown, 150, 230);
        }

        async function startFloating() {
            // تحويل الـ Canvas إلى فيديو لتفعيل وضع PiP
            const stream = canvas.captureStream(10);
            video.srcObject = stream;
            
            try {
                await video.play();
                if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                } else {
                    alert("متصفحك لا يدعم الأيقونة العائمة");
                }
            } catch (error) {
                alert("يرجى التفاعل مع الصفحة أولاً");
            }
        }

        function update() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    // بيانات تجريبية (يتم ربطها بـ API الأوقات الحقيقي)
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', hour12: true });
                    drawWidget("المغرب", "06:50 م", "باقي 1س و47د");
                });
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
